<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARSEUR 10X v2 Engine | Verifiable Credit Report Analysis Demo</title>
<meta name="description" content="Research prototype: verifiable AI credit report analysis with span-grounded extraction, cross-bureau entity resolution, and FCRA error detection.">
<style>
  :root { --bg:#0b0d10; --panel:#13161b; --line:#23282f; --ink:#e8e6e1; --dim:#9aa3ad; --gold:#d4a843; --green:#5dbb7f; --red:#e06c5c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--ink); font-family:Georgia,'Times New Roman',serif; line-height:1.6; }
  .wrap { max-width:1080px; margin:0 auto; padding:48px 20px; }
  h1 { font-size:2rem; letter-spacing:.5px; }
  h1 span { color:var(--gold); }
  .sub { color:var(--dim); margin:8px 0 32px; font-style:italic; }
  .grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
  @media (max-width:820px){ .grid{ grid-template-columns:1fr; } }
  textarea { width:100%; height:220px; background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:12px; font-family:ui-monospace,Menlo,monospace; font-size:12px; resize:vertical; }
  label { display:block; font-size:.8rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); margin:0 0 6px; }
  .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin:22px 0; }
  button { background:var(--gold); color:#161616; border:0; border-radius:8px; padding:12px 22px; font-size:1rem; font-weight:bold; cursor:pointer; font-family:inherit; }
  button.ghost { background:transparent; color:var(--gold); border:1px solid var(--gold); }
  input[type=password] { background:var(--panel); border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:11px 12px; min-width:280px; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:20px; margin:14px 0; }
  .stat { display:inline-block; margin-right:26px; }
  .stat b { color:var(--gold); font-size:1.3rem; }
  .err { border-left:3px solid var(--red); padding:12px 16px; margin:12px 0; background:#171217; border-radius:0 8px 8px 0; }
  .err h4 { color:var(--red); font-size:.85rem; letter-spacing:1.5px; }
  .ev { font-family:ui-monospace,Menlo,monospace; font-size:11.5px; color:var(--dim); margin-top:6px; }
  .ev em { color:var(--green); font-style:normal; }
  .conf { float:right; color:var(--dim); font-size:.8rem; }
  pre.letter { white-space:pre-wrap; font-family:ui-monospace,Menlo,monospace; font-size:12px; background:#0e1013; border:1px solid var(--line); border-radius:8px; padding:16px; max-height:340px; overflow:auto; }
  .note { color:var(--dim); font-size:.85rem; }
  .tag { display:inline-block; border:1px solid var(--line); border-radius:99px; padding:2px 10px; font-size:.72rem; color:var(--dim); margin-left:8px; vertical-align:middle; }
</style>
</head>
<body>
<div class="wrap">
  <h1>PARSEUR <span>10X</span> v2 Engine <span class="tag">research prototype</span></h1>
  <p class="sub">Span-grounded extraction. Cross-bureau entity resolution. FCRA error detection. Every claim traceable to the source document.</p>

  <div class="grid">
    <div><label>Equifax report text</label><textarea id="eq"></textarea></div>
    <div><label>Experian report text</label><textarea id="ex"></textarea></div>
    <div><label>TransUnion report text</label><textarea id="tu"></textarea></div>
  </div>

  <div class="row">
    <button id="run">Analyze Reports</button>
    <button class="ghost" id="sample">Load Synthetic Sample</button>
    <input type="password" id="key" placeholder="OpenRouter API key (optional, enables LLM mode)">
    <span class="note">No key = deterministic structure-detection mode, runs fully in your browser. Nothing is uploaded anywhere.</span>
  </div>

  <div id="out"></div>
</div>

<script type="module">
import { analyzeReports } from '../src/engine.js';
import { generateDocumentSet, setSeed } from '../test/synthetic.js';

const $ = (id) => document.getElementById(id);
let lastSample = null;

$('sample').onclick = () => {
  setSeed(Date.now() % 100000);
  lastSample = generateDocumentSet({ nTradelines: 6 });
  $('eq').value = lastSample.reports.equifax;
  $('ex').value = lastSample.reports.experian;
  $('tu').value = lastSample.reports.transunion;
  $('out').innerHTML = '<p class="note">Synthetic tri-bureau set loaded with seeded errors. Click Analyze Reports.</p>';
};

$('run').onclick = async () => {
  const reports = { equifax: $('eq').value, experian: $('ex').value, transunion: $('tu').value };
  if (!Object.values(reports).some(t => t.trim())) { $('out').innerHTML = '<p class="note">Paste at least one report or load the sample.</p>'; return; }
  $('out').innerHTML = '<p class="note">Analyzing...</p>';
  const key = $('key').value.trim();
  try {
    const res = await analyzeReports(reports, key ? { mode:'llm', apiKey:key } : { mode:'deterministic' });
    render(res);
  } catch (e) { $('out').innerHTML = `<p class="note">Error: ${e.message}</p>`; }
};

function esc(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function render(res) {
  const v = res.verification;
  let html = `<div class="panel">
    <span class="stat"><b>${v.fields_verified}</b> fields verified</span>
    <span class="stat"><b>${v.fields_rejected}</b> rejected (unverifiable span)</span>
    <span class="stat"><b>${(100*v.hallucination_rate).toFixed(2)}%</b> hallucination rate</span>
    <span class="stat"><b>${(100*v.mean_confidence).toFixed(1)}%</b> mean confidence</span>
    <span class="stat"><b>${res.entities.length}</b> resolved accounts</span>
    <span class="stat"><b>${res.errors.length}</b> errors detected</span>
  </div>`;

  if (res.errors.length) {
    html += `<h2 style="margin:26px 0 4px">Detected Errors</h2>`;
    for (const e of res.errors) {
      html += `<div class="err"><h4>${e.type} <span class="conf">confidence ${(100*e.confidence).toFixed(0)}%</span></h4>
        <div>${esc(e.explanation)}</div>
        ${e.evidence.map(ev => `<div class="ev">${ev.bureau} / ${ev.field}: <em>"${esc(ev.span)}"</em></div>`).join('')}
      </div>`;
    }
    html += `<h2 style="margin:26px 0 10px">Evidence-Linked Dispute Letters</h2>`;
    for (const [bureau, letter] of Object.entries(res.letters)) {
      if (!letter.includes('1.')) continue;
      html += `<label style="margin-top:14px">${bureau}</label><pre class="letter">${esc(letter)}</pre>`;
    }
  } else {
    html += `<div class="panel">No errors detected across the supplied reports.</div>`;
  }
  $('out').innerHTML = html;
}
</script>
</body>
</html>
